services:

  # ── FastAPI application ───────────────────────────────────────────────────
  app:
    build: .
    container_name: mimzag_app
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./static:/app/static:ro
    networks:
      - caddy_net

networks:
  # Shared external network — Caddy (from the other project) must be on this too
  caddy_net:
    external: true
