# ── HTTP — redirect to HTTPS + serve ACME challenge ──────────────────────────
server {
    listen 80;
    server_name mimzag.com www.mimzag.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://mimzag.com$request_uri;
    }
}

# ── HTTPS — main site ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name mimzag.com www.mimzag.com;

    # SSL certificates (issued by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/mimzag.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mimzag.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # Redirect www → non-www
    if ($host = www.mimzag.com) {
        return 301 https://mimzag.com$request_uri;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Static files — served directly by nginx (faster, no FastAPI overhead)
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Proxy everything else to FastAPI
    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
